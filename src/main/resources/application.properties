# Application
spring.application.name=core
spring.config.import=optional:file:.env[.properties],optional:file:core/.env[.properties]

# ==========================================
# PostgreSQL Configuration
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ==========================================
# Redis Configuration
# ==========================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# ==========================================
# Security - JWT & Stripe
# ==========================================
secret-key=${SECRET_KEY}
jwt.expiration=3600000
sk_stripe=${SK_STRIPE}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# ==========================================
# Twilio (SMS + WhatsApp)
# ==========================================
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}
twilio.whatsapp-number=${TWILIO_WHATSAPP_NUMBER:}
twilio.messaging-service-sid=${TWILIO_MESSAGING_SERVICE_SID:}

# ==========================================
# Parking
# ==========================================
parking.name=${PARKING_NAME:Parking Core}
parking.frontend-url=${FRONTEND_URL:https://parkingfront.azurewebsites.net}

# ==========================================
# Actuator / Health Checks
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.readiness.include=db

# Disable Redis health check in cloud to avoid failing readiness when Redis is unreachable
management.health.redis.enabled=false

# ==========================================
# Server
# ==========================================
server.port=${PORT:8080}
