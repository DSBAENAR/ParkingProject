# Application
spring.application.name=core

# ==========================================
# PostgreSQL Configuration
# ==========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/parkingdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ==========================================
# Redis Configuration
# ==========================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# ==========================================
# Security - JWT & Stripe
# ==========================================
secret-key=${SECRET_KEY}
jwt.expiration=3600000
sk_stripe=${SK_STRIPE:sk_test_placeholder}

# ==========================================
# Actuator / Health Checks
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.readiness.include=db

# Disable Redis health check in cloud to avoid failing readiness when Redis is unreachable
management.health.redis.enabled=false

# ==========================================
# Server
# ==========================================
server.port=${PORT:8080}
